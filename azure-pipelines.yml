# Generated by Archly. Configure provider credentials as secret pipeline variables before apply.
trigger:
  branches:
    include:
      - main
  paths:
    include:
      - terraform/*

pr:
  paths:
    include:
      - terraform/*

parameters:
  - name: apply
    displayName: Apply Terraform after review
    type: boolean
    default: false

pool:
  vmImage: ubuntu-latest

stages:
  - stage: plan
    displayName: Terraform plan
    jobs:
      - job: terraform
        displayName: Validate and plan
        steps:
          - checkout: self
          - bash: |
              set -euo pipefail
              terraform -chdir=terraform fmt -check -recursive
              terraform -chdir=terraform init -input=false
              terraform -chdir=terraform validate
              terraform -chdir=terraform plan -input=false -out=tfplan
            displayName: Terraform validate and plan
            env:
        AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
        AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)
        AWS_DEFAULT_REGION: $(AWS_REGION)
          - bash: terraform -chdir=terraform apply -input=false -auto-approve tfplan
            displayName: Terraform apply
            condition: and(succeeded(), eq('${{ parameters.apply }}', true))
            env:
        AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
        AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)
        AWS_DEFAULT_REGION: $(AWS_REGION)
